# ============================================================
# ANSIBLE INVENTORY
# ============================================================
# ZWECK:   Teilt Ansible mit welche Server existieren
#          und wie man sich verbindet
#
# WICHTIG: In der Pipeline wird diese Datei automatisch
#          mit der aktuellen VM-IP überschrieben!
#          (siehe pipeline.yml → "Inventory dynamisch erstellen")
#
# LOKAL:   Für manuelle Tests kannst du diese Datei
#          mit der festen IP verwenden
# ============================================================

# ---- GRUPPE: webserver ----
# Alle Server in dieser Gruppe bekommen das Nginx-Playbook
[webserver]
#    │
#    └── Gruppenname → playbook.yml sagt "hosts: webserver"
#                      Ansible weiß dann welche Server gemeint sind

web-server-prod ansible_host=10.0.30.101
#    │                │         │
#    │                │         └── IP-Adresse der VM
#    │                │              (statisch aus terraform.tfvars)
#    │                └── Sagt Ansible: "Verbinde dich mit dieser IP"
#    └── Anzeigename (nur für Ansible intern)

# ============================================================
# VERBINDUNGS-VARIABLEN FÜR ALLE SERVER
# ============================================================
[all:vars]
#   │
#   └── "all" = gilt für ALLE Gruppen (webserver, später db usw.)
#       ":vars" = das sind Variablen

# Mit welchem Benutzer verbindet sich Ansible?
ansible_user=randolph
#    │
#    └── MUSS übereinstimmen mit:
#        - Packer user-data (dort wird "randolph" angelegt)
#        - Terraform main.tf (username = "randolph")
#        - SSH-Key (gehört zu "randolph")

# Wo liegt der private SSH-Key?
ansible_ssh_private_key_file=~/.ssh/id_rsa
#    │
#    └── Der private Key mit dem Ansible sich einloggt
#        Der öffentliche Key liegt bereits in der VM
#        (wurde von Terraform via Cloud-Init eingespielt)

# Welches Python soll Ansible auf der VM verwenden?
ansible_python_interpreter=/usr/bin/python3
#    │
#    └── Ansible braucht Python auf dem ZIEL-Server
#        Ubuntu 22.04 hat Python3 vorinstalliert
#        Ohne diese Zeile sucht Ansible nach "python" (Python2)
#        → Fehler auf modernen Ubuntu-Systemen!!!